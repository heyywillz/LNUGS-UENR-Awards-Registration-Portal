<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - LNUGS-UENR Excellence Awards 2026</title>
    <meta name="description" content="Admin login portal for the LNUGS-UENR Excellence Awards 2026 nomination management system.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,600,700,800,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        body { font-family: 'Satoshi', sans-serif; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center" style="background-color: #8B0000;">

    <div class="w-full" style="max-width: 400px; padding: 0 1rem;">
        <div class="bg-white rounded-lg shadow-xl p-8">
            <div class="text-center mb-6">
                <img src="/images/logo.jpg" alt="LNUGS" class="w-16 h-16 mx-auto rounded-full">
                <h1 class="text-2xl mt-4" style="font-weight: 700; color: #1a1a1a;">Admin Access</h1>
                <p class="text-sm mt-1" style="color: #6b7280;">Sign in to manage nominations</p>
            </div>

            <form id="login-form" autocomplete="off">
                <div class="mb-4">
                    <label for="username" class="block text-xs mb-1.5" style="font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: #374151;">USERNAME</label>
                    <input
                        type="text"
                        id="username"
                        name="username"
                        required
                        class="w-full border px-3 py-2.5 outline-none transition-all duration-200"
                        style="border-radius: 0.375rem; border-color: #d1d5db;"
                        onfocus="this.style.borderColor='#C0111F'; this.style.boxShadow='0 0 0 3px rgba(192,17,31,0.15)';"
                        onblur="this.style.borderColor='#d1d5db'; this.style.boxShadow='none';"
                    >
                </div>

                <div class="mb-6">
                    <label for="password" class="block text-xs mb-1.5" style="font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: #374151;">PASSWORD</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        required
                        class="w-full border px-3 py-2.5 outline-none transition-all duration-200"
                        style="border-radius: 0.375rem; border-color: #d1d5db;"
                        onfocus="this.style.borderColor='#C0111F'; this.style.boxShadow='0 0 0 3px rgba(192,17,31,0.15)';"
                        onblur="this.style.borderColor='#d1d5db'; this.style.boxShadow='none';"
                    >
                </div>

                <div id="login-error" class="hidden text-sm mb-4 text-center" style="color: #DC2626;"></div>

                <button
                    type="submit"
                    class="w-full text-white py-2.5 transition-colors duration-200"
                    style="background-color: #C0111F; border-radius: 0.375rem; font-weight: 600;"
                    onmouseover="this.style.backgroundColor='#8B0000';"
                    onmouseout="this.style.backgroundColor='#C0111F';"
                >
                    Sign In
                </button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async function (e) {
            e.preventDefault();

            const errorDiv = document.getElementById('login-error');
            errorDiv.classList.add('hidden');
            errorDiv.textContent = '';

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (!username || !password) {
                errorDiv.textContent = 'Please enter both username and password.';
                errorDiv.classList.remove('hidden');
                return;
            }

            try {
                const response = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                if (response.ok) {
                    window.location.href = '/admin.html';
                } else {
                    const data = await response.json().catch(() => ({}));
                    errorDiv.textContent = data.error || 'Invalid username or password.';
                    errorDiv.classList.remove('hidden');
                }
            } catch (err) {
                errorDiv.textContent = 'Network error. Please try again.';
                errorDiv.classList.remove('hidden');
            }
        });
    </script>

</body>
</html>
